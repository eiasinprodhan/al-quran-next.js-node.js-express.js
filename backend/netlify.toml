[build]
  command = "npm run build"
  publish = "public"

[functions]
  directory = "netlify/functions"
  # Include the SQLite database in the function bundle
  included_files = ["quran.db"]
  # better-sqlite3 uses native bindings which must be compiled for Linux
  external_node_modules = ["better-sqlite3"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api"
  status = 200
